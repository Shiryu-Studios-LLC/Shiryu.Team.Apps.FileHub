version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    groups:
      team-app-sdk:
        patterns:
          - "@shiryustudios/team-app-sdk"
      npm-dependencies:
        patterns:
          - "*"
